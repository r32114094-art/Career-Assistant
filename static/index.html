<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伯乐 Bole — 世有伯乐，然后有千里马</title>
    <meta name="description" content="伯乐 Bole — 你的 AI 职业伯乐，助你成为千里马。学习路径、简历优化、面试准备、求职辅助，一站式 AI 职业服务。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-theme="light">

<!-- ═══════════════ 欢迎 / 登录屏 ═══════════════ -->
<div id="welcome-screen" class="screen active">
    <div class="welcome-container">
        <div class="welcome-glow"></div>
        <div class="welcome-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <img src="/static/bole-avatar.png" alt="伯乐" style="width:88px;height:88px;border-radius:50%;object-fit:cover;box-shadow:0 4px 24px rgba(217,119,6,.25);border:3px solid rgba(217,119,6,.3);">
                </div>
                <h1 class="welcome-title">伯乐 <span style="font-size:0.6em;opacity:0.7;font-weight:400">Bole</span></h1>
                <p class="welcome-subtitle">世有伯乐，然后有千里马 🐴</p>
                <p class="welcome-subtitle" style="font-size:0.9em;opacity:0.65;margin-top:4px">你的 AI 职业伯乐，助你成为千里马</p>
            </div>

            <div class="features-grid">
                <div class="feature-chip"><span class="feature-icon">📚</span>学习路径</div>
                <div class="feature-chip"><span class="feature-icon">📄</span>简历优化</div>
                <div class="feature-chip"><span class="feature-icon">🎯</span>面试准备</div>
                <div class="feature-chip"><span class="feature-icon">🔍</span>求职辅助</div>
            </div>

            <div class="login-section">
                <label class="input-label" for="user-id-input">你的名字</label>
                <div class="input-group" style="margin-bottom: 12px">
                    <input type="text" id="user-id-input" placeholder="随便取一个，如：barry" autocomplete="username" spellcheck="false">
                </div>
                <label class="input-label" for="password-input">访问口令</label>
                <div class="input-group">
                    <input type="password" id="password-input" placeholder="管理员发放的口令" autocomplete="current-password">
                    <button id="start-btn" class="btn-primary" disabled>
                        <span class="btn-text">登录</span>
                        <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/></svg>
                    </button>
                </div>
                <p class="login-error" id="login-error" style="display:none; color:#ef4444; font-size:0.85rem; margin-top:8px;"></p>
                <p class="input-hint">你的名字即用户 ID，同名会话画像自动互通</p>

                <div style="display:flex;align-items:center;gap:12px;margin:18px 0 10px">
                    <hr style="flex:1;border:none;border-top:1px solid rgba(150,150,150,.2)">
                    <span style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap">或者</span>
                    <hr style="flex:1;border:none;border-top:1px solid rgba(150,150,150,.2)">
                </div>
                <button id="guest-btn" class="btn-primary" style="width:100%;background:transparent;border:1.5px solid var(--accent);color:var(--accent);justify-content:center;gap:6px">
                    🚀 <span>游客体验</span><span style="font-size:0.8em;opacity:0.65;margin-left:4px">（无需口令）</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ 聊天屏 ═══════════════ -->
<div id="chat-screen" class="screen">
    <!-- 左侧会话列表 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-user">
                <span class="sidebar-user-avatar" id="sidebar-user-avatar">U</span>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-label">用户</span>
                    <span class="sidebar-user-id" id="sidebar-user-id">—</span>
                </div>
            </div>
            <button class="btn-new-chat" id="btn-new-chat" title="新建对话">
                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/></svg>
                <span>新建对话</span>
            </button>
        </div>
        <div class="sidebar-list" id="sidebar-list">
            <!-- 会话列表通过 JS 注入 -->
        </div>
        <div class="sidebar-footer">
            <button class="btn-profile" id="btn-profile">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                我的画像
            </button>
            <button class="btn-theme-toggle" id="btn-theme-toggle" title="切换暗色/亮色模式">
                <svg id="theme-icon-sun" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                <svg id="theme-icon-moon" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                <span id="theme-label">暗色模式</span>
            </button>
            <button class="btn-logout" id="logout-btn">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H3zm4.293 4.293a1 1 0 011.414 0L10 8.586l1.293-1.293a1 1 0 111.414 1.414L11.414 10l1.293 1.293a1 1 0 01-1.414 1.414L10 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L8.586 10 7.293 8.707a1 1 0 010-1.414z"/></svg>
                退出登录
            </button>
        </div>
    </aside>

    <!-- 右侧主区 -->
    <div class="chat-main">
    <!-- 顶部导航栏 -->
    <header class="chat-header">
        <div class="header-left">
            <button class="btn-icon btn-toggle-sidebar" id="btn-toggle-sidebar" title="切换侧边栏">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
            </button>
            <div class="header-avatar">
                <img src="/static/bole-avatar.png" alt="伯乐" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
            </div>
            <div class="header-info">
                <span class="header-title" id="current-session-title">伯乐 Bole</span>
                <span class="header-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">连接中...</span>
                </span>
            </div>
        </div>
        <div class="header-right">
            <span class="session-badge" id="session-badge"></span>
        </div>
    </header>

    <!-- 消息区域 -->
    <main class="chat-messages" id="chat-messages">
        <div class="welcome-message">
            <p>🐴 你好！我是<strong>伯乐</strong>，你的 AI 职业助手，可以帮你：</p>
            <div class="quick-actions">
                <button class="quick-btn" data-msg="我想学习生成式AI，请推荐学习路径">📚 学习路径</button>
                <button class="quick-btn" data-msg="我想优化我的简历，请帮我分析">📄 简历优化</button>
                <button class="quick-btn" data-msg="我想准备AI面试，有哪些常见面试题？">🎯 面试准备</button>
                <button class="quick-btn" data-msg="帮我搜索远程AI工程师岗位">🔍 搜索岗位</button>
            </div>
        </div>
    </main>

    <!-- HITL 审核面板（精简版：仅确认/拒绝） -->
    <div class="hitl-panel" id="hitl-panel">
        <div class="hitl-card">
            <div class="hitl-header">
                <span class="hitl-icon">💡</span>
                <span class="hitl-title" id="hitl-instruction">请检查上方结果，确认是否保存？</span>
            </div>
            <div class="hitl-actions">
                <button class="btn-approve" id="hitl-approve">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
                    确认保存
                </button>
                <button class="btn-reject" id="hitl-reject">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>
                    拒绝
                </button>
            </div>
        </div>
    </div>

    <!-- 简历上传 + JD 输入面板（隐藏，上传成功后显示） -->
    <div class="resume-panel" id="resume-preview-bar" style="display:none">
        <!-- 顶部：文件信息 + 取消 -->
        <div class="resume-panel-header">
            <div class="resume-preview-info">
                <svg viewBox="0 0 20 20" fill="currentColor" class="resume-icon"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
                <span id="resume-filename">简历.pdf</span>
                <span class="resume-chars" id="resume-chars"></span>
            </div>
            <button class="btn-cancel-resume" id="btn-cancel-resume" title="取消上传">✕</button>
        </div>
        <!-- 中部：JD 粘贴框 -->
        <div class="jd-input-area">
            <label class="jd-label">粘贴岗位 JD（可选）— 提供后建议更有针对性</label>
            <textarea id="jd-input" class="jd-textarea" placeholder="将招聘要求 / 职位描述粘贴到这里…" rows="4"></textarea>
        </div>
        <!-- 底部：发送按钮 -->
        <div class="resume-panel-footer">
            <button class="btn-send-resume" id="btn-send-resume" disabled>发送给 AI 分析</button>
        </div>
    </div>

    <!-- 输入区域 -->
    <footer class="chat-input-area" id="chat-input-area">
        <!-- 隐藏文件 input -->
        <input type="file" id="resume-file-input" accept=".pdf,.docx,.txt" style="display:none">
        <div class="input-wrapper">
            <button class="btn-upload" id="btn-upload" title="上传简历 (PDF / DOCX / TXT)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </button>
            <textarea id="message-input" placeholder="输入你的问题…" rows="1" autocomplete="off"></textarea>
            <button id="send-btn" class="btn-send" disabled title="发送">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </footer>
    <!-- 滚动到底部按钮 -->
    <button class="scroll-bottom-btn" id="scroll-bottom-btn" title="滚动到底部">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
    </button>
    </div><!-- /chat-main -->

<!-- 复制成功 Toast -->
<div class="copy-toast" id="copy-toast">✓ 已复制到剪贴板</div>
</div>

<!-- ═══════════════ 画像 Modal ═══════════════ -->
<div id="profile-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                我的画像
            </div>
            <button class="modal-close" id="profile-modal-close">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>
            </button>
        </div>
        <p class="modal-desc">AI 从对话中自动提取的信息，你可以随时修改。保存后下次对话即时生效。</p>

        <div class="modal-body" id="profile-form-body">
            <div class="profile-row">
                <div class="profile-field">
                    <label>姓名</label>
                    <input type="text" id="pf-name" placeholder="例：张伟">
                </div>
                <div class="profile-field">
                    <label>目标职位</label>
                    <input type="text" id="pf-target-role" placeholder="例：NLP Engineer">
                </div>
            </div>
            <div class="profile-row">
                <div class="profile-field">
                    <label>技能水平</label>
                    <select id="pf-skill-level">
                        <option value="">— 未设置 —</option>
                        <option value="beginner">初学者</option>
                        <option value="intermediate">中级</option>
                        <option value="senior">高级 / 资深</option>
                    </select>
                </div>
                <div class="profile-field">
                    <label>工作年限</label>
                    <input type="number" id="pf-years" placeholder="例：3" min="0" max="50">
                </div>
            </div>
            <div class="profile-row">
                <div class="profile-field">
                    <label>求职地点偏好</label>
                    <input type="text" id="pf-location" placeholder="例：北京 / 上海 / 远程">
                </div>
                <div class="profile-field">
                    <label>工作方式</label>
                    <select id="pf-work-type">
                        <option value="">— 未设置 —</option>
                        <option value="remote">远程</option>
                        <option value="onsite">线下</option>
                        <option value="hybrid">混合</option>
                    </select>
                </div>
            </div>
            <div class="profile-field profile-field-full">
                <label>背景介绍</label>
                <textarea id="pf-background" rows="2" placeholder="例：计算机科学硕士，2 年 NLP 工程经验"></textarea>
            </div>
            <div class="profile-field profile-field-full">
                <label>技能栈 <span class="field-hint">用逗号或回车分隔</span></label>
                <div class="tag-input-wrap" id="pf-skills-wrap">
                    <div class="tag-list" id="pf-skills-tags"></div>
                    <input type="text" id="pf-skills-input" placeholder="输入后按回车添加…">
                </div>
            </div>
            <div class="profile-field profile-field-full">
                <label>兴趣方向 <span class="field-hint">用逗号或回车分隔</span></label>
                <div class="tag-input-wrap" id="pf-interests-wrap">
                    <div class="tag-list" id="pf-interests-tags"></div>
                    <input type="text" id="pf-interests-input" placeholder="输入后按回车添加…">
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <span class="profile-save-msg" id="profile-save-msg"></span>
            <button class="btn-secondary" id="profile-cancel-btn">取消</button>
            <button class="btn-primary" id="profile-save-btn">保存画像</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
