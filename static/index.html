<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI 职业助手 — 你的 AI 职业规划伙伴</title>
    <meta name="description" content="GenAI Career Assistant — 学习路径规划、简历制作、面试准备、求职辅助，一站式 AI 职业服务。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ═══════════════ 欢迎 / 登录屏 ═══════════════ -->
<div id="welcome-screen" class="screen active">
    <div class="welcome-container">
        <div class="welcome-glow"></div>
        <div class="welcome-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="url(#grad1)" stroke-width="2.5"/>
                        <path d="M16 20C16 20 19 16 24 16C29 16 32 20 32 20" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
                        <path d="M14 28C14 28 18 34 24 34C30 34 34 28 34 28" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="20" cy="23" r="1.5" fill="#D97706"/>
                        <circle cx="28" cy="23" r="1.5" fill="#D97706"/>
                        <defs><linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#D97706"/><stop offset="1" stop-color="#B45309"/></linearGradient></defs>
                    </svg>
                </div>
                <h1 class="welcome-title">GenAI 职业助手</h1>
                <p class="welcome-subtitle">你开启生成式 AI 职业生涯的终极指南 🚀</p>
            </div>

            <div class="features-grid">
                <div class="feature-chip"><span class="feature-icon">📚</span>学习路径</div>
                <div class="feature-chip"><span class="feature-icon">📄</span>简历制作</div>
                <div class="feature-chip"><span class="feature-icon">🎯</span>面试准备</div>
                <div class="feature-chip"><span class="feature-icon">🔍</span>求职辅助</div>
            </div>

            <div class="login-section">
                <label class="input-label" for="user-id-input">输入你的用户 ID 开始对话</label>
                <div class="input-group">
                    <input type="text" id="user-id-input" placeholder="例如：barry_2025" autocomplete="off" spellcheck="false">
                    <button id="start-btn" class="btn-primary" disabled>
                        <span class="btn-text">进入助手</span>
                        <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/></svg>
                    </button>
                </div>
                <p class="input-hint">同一 ID 可恢复历史对话</p>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ 聊天屏 ═══════════════ -->
<div id="chat-screen" class="screen">
    <!-- 顶部导航栏 -->
    <header class="chat-header">
        <div class="header-left">
            <div class="header-avatar">
                <svg viewBox="0 0 28 28" fill="none">
                    <circle cx="14" cy="14" r="12" stroke="url(#grad2)" stroke-width="1.8"/>
                    <path d="M9 12C9 12 11 9 14 9C17 9 19 12 19 12" stroke="url(#grad2)" stroke-width="1.4" stroke-linecap="round"/>
                    <circle cx="12" cy="13.5" r="1" fill="#D97706"/>
                    <circle cx="16" cy="13.5" r="1" fill="#D97706"/>
                    <path d="M10 17C10 17 11.5 20 14 20C16.5 20 18 17 18 17" stroke="url(#grad2)" stroke-width="1.4" stroke-linecap="round"/>
                    <defs><linearGradient id="grad2" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#D97706"/><stop offset="1" stop-color="#B45309"/></linearGradient></defs>
                </svg>
            </div>
            <div class="header-info">
                <span class="header-title">GenAI 职业助手</span>
                <span class="header-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">连接中...</span>
                </span>
            </div>
        </div>
        <div class="header-right">
            <span class="session-badge" id="session-badge"></span>
            <button class="btn-icon" id="logout-btn" title="退出">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H3zm4.293 4.293a1 1 0 011.414 0L10 8.586l1.293-1.293a1 1 0 111.414 1.414L11.414 10l1.293 1.293a1 1 0 01-1.414 1.414L10 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L8.586 10 7.293 8.707a1 1 0 010-1.414z"/></svg>
            </button>
        </div>
    </header>

    <!-- 消息区域 -->
    <main class="chat-messages" id="chat-messages">
        <div class="welcome-message">
            <p>👋 你好！我是 <strong>GenAI 职业助手</strong>，可以帮你：</p>
            <div class="quick-actions">
                <button class="quick-btn" data-msg="我想学习生成式AI，请推荐学习路径">📚 学习 GenAI</button>
                <button class="quick-btn" data-msg="帮我制作一份AI工程师的简历">📄 制作简历</button>
                <button class="quick-btn" data-msg="我想准备AI面试，有哪些常见面试题？">🎯 面试准备</button>
                <button class="quick-btn" data-msg="帮我搜索远程AI工程师岗位">🔍 搜索岗位</button>
            </div>
        </div>
    </main>

    <!-- HITL 审核面板（精简版：仅确认/拒绝） -->
    <div class="hitl-panel" id="hitl-panel">
        <div class="hitl-card">
            <div class="hitl-header">
                <span class="hitl-icon">💡</span>
                <span class="hitl-title" id="hitl-instruction">请检查上方结果，确认是否保存？</span>
            </div>
            <div class="hitl-actions">
                <button class="btn-approve" id="hitl-approve">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
                    确认保存
                </button>
                <button class="btn-reject" id="hitl-reject">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>
                    拒绝
                </button>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <footer class="chat-input-area" id="chat-input-area">
        <div class="input-wrapper">
            <textarea id="message-input" placeholder="输入你的问题…" rows="1" autocomplete="off"></textarea>
            <button id="send-btn" class="btn-send" disabled title="发送">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </footer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
